# Pre-commit configuration
# Install: pre-commit install
# Update: pre-commit autoupdate

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]

  # Android formatting, linting, and testing
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: fc6db25b1274e8adefb7ae32bb497560e7885a8c
    hooks:
      - id: pretty-format-kotlin
        args: [ --ktfmt ]

  - repo: local
    hooks:
      - id: assemble-debug
        name: assemble check
        description: Check that the Android project assembles successfully
        entry: ./gradlew assembleDebug
        language: system
        pass_filenames: false

      - id: assemble-release
        name: assemble release check
        description: Check that the Android project assembles successfully in release mode
        entry: ./gradlew assembleRelease
        language: system
        pass_filenames: false

      - id: test
        name: test check
        description: Check that the Android project tests run successfully
        entry: ./gradlew testDebugUnitTest
        language: system
        pass_filenames: false
